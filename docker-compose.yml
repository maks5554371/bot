version: "3.8"

services:
  mongo:
    image: mongo:7
    container_name: quest-mongo
    restart: unless-stopped
    environment:
      - MONGO_INITDB_ROOT_USERNAME=${MONGO_USER:-questadmin}
      - MONGO_INITDB_ROOT_PASSWORD=${MONGO_PASSWORD}
    # Порт НЕ пробрасывается наружу — доступ только из docker-сети
    volumes:
      - mongo_data:/data/db
    networks:
      - quest-net

  backend:
    build: ./backend
    container_name: quest-backend
    restart: unless-stopped
    # Порт только внутри docker-сети, nginx на хосте проксирует
    expose:
      - "3001"
    ports:
      - "127.0.0.1:3001:3001"
    env_file: .env
    environment:
      - MONGO_URI=mongodb://${MONGO_USER:-questadmin}:${MONGO_PASSWORD}@mongo:27017/quest?authSource=admin
    depends_on:
      - mongo
    networks:
      - quest-net

  bot:
    build: ./bot
    container_name: quest-bot
    restart: unless-stopped
    env_file: .env
    environment:
      - BACKEND_URL=http://backend:3001
    depends_on:
      - backend
    networks:
      - quest-net

volumes:
  mongo_data:

networks:
  quest-net:
    driver: bridge
